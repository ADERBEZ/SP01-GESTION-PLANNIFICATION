            <nav>
                <ul>
                    <li><a href="index.html">Accueil</a></li>

            <div class="site-title">
                <span class="separator">|</span> SP-01 : GESTION & PLANIFICATION
            </div>
        </div>
    </header>

    <main>
        <section class="scp-form-container">
            <h2>CENTRE DE TRANSMISSION SÉCURISÉ</h2>
            <p class="page-subtitle">Canal de communication chiffré vers le Conseil de Direction.</p>

            <form>
                <div class="form-group">
                    <label>IDENTIFIANT DU PERSONNEL (PSEUDO DISCORD/IN-GAME)</label>
                    <input type="text" placeholder="Ex: Agent_Larsen" required>
                </div>

                <div class="form-group">
                    <label>OBJET DE LA TRANSMISSION</label>
                    <select required>
                        <option value="">Sélectionnez une option...</option>
                        <option value="recrutement">Recrutement (Branche Build)</option>
                        <option value="moderation">Recrutement (Branche Modération)</option>
                        <option value="incident">Rapport d'incident RP</option>
                        <option value="suggestion">Suggestion d'amélioration</option>
                        <option value="autre">Autre demande</option>
                    </select>
                </div>

                <div class="form-group">
                    <label>MESSAGE CRYPTÉ (DÉTAILS DE VOTRE DEMANDE)</label>
                    <textarea rows="8" placeholder="Veuillez détailler votre message ici..." required></textarea>
                </div>

                <button type="submit" class="submit-btn">INITIER LA TRANSMISSION</button>
            </form>
        </section>
    </main>

    <footer style="text-align: center; padding: 20px;">
        <p>Alerte : Toute fausse déclaration sera sanctionnée d'une rétrogradation de niveau 1.</p>
    </footer>
